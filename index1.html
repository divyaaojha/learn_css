<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="description" content="A card for a product from our dessert shop.">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Card UI</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<div class="card">
    <img src="https://images.pexels.com/photos/19651140/pexels-photo-19651140.jpeg" alt="card image" width="300" height="350">
    <div class="card-content">
        <h3><strong> Chocolate Mousse Cake</strong></h3>
        <h4><b>Rs.99/-</b></h4>

        <div class="rating">
            <span class="fa fa-star checked"></span>
            <span class="fa fa-star checked"></span>
            <span class="fa fa-star checked"></span>
            <span class="fa fa-star checked"></span>
            <span class="fa fa-star"></span>
        </div>

        <p>This is an image of the kind of desserts we sell, come checkout the store for more.</p>
        <button>Buy Now</button>
    </div>
</div>

</body>
</html>
